<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#f7f7f8; margin:0; }
        main { padding: 12px; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">Task Manager System</a>

        <div>
            {% if user.is_authenticated %}
                <span style="
                color:white;
                padding:6px 12px;
                font-weight:600;
                font-size:14px;
                letter-spacing:0.3px;
                ">
                {{ user.username }}
                </span>
                <a class="btn btn-danger" href="/accounts/logout/">Logout</a>
            {% else %}
                <a class="btn btn-light" href="/accounts/login/">Log In</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
